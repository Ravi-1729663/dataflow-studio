services:
  web:
    build: .
    env_file: .env
    environment:
      USE_POSTGRES: "1"
      CELERY_TASK_ALWAYS_EAGER: "0"
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    # --pool=solo: single process, no forking. Pipeline metrics live in whichever process
    # incremented them (see config/celery.py's worker_init hook) — forked prefork children would
    # each have their own registry, invisible to the /metrics server the parent starts.
    command: celery -A config worker -l info --pool=solo
    env_file: .env
    environment:
      USE_POSTGRES: "1"
      CELERY_TASK_ALWAYS_EAGER: "0"
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "9808:9808"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      USE_POSTGRES: "1"
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dataflow
      POSTGRES_USER: dataflow
      POSTGRES_PASSWORD: dataflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus]

volumes:
  pgdata:
